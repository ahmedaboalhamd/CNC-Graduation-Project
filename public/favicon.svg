<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#0a0a0f" />
      <stop offset="100%" stop-color="#000000" />
    </radialGradient>
    
    <!-- Primary Blue/Cyan Gradient -->
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <!-- Purple/Pink Gradient for Rings -->
    <linearGradient id="purple-grad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    
    <!-- Drop Shadow for the Q -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Dark Background -->
  <rect width="512" height="512" fill="url(#bg-glow)" rx="100" />

  <!-- Diagonal Light Ray -->
  <path d="M 0 512 L 512 0" stroke="url(#primary-grad)" stroke-width="2" opacity="0.4" />
  
  <g transform="translate(256, 256) scale(1.1)">
    <!-- Back Atom Ring (Purple) -->
    <ellipse cx="0" cy="0" rx="160" ry="50" fill="none" stroke="url(#purple-grad)" stroke-width="8" transform="rotate(-30)" />
    <!-- Small Orb on purple ring -->
    <circle cx="110" cy="-110" r="14" fill="#ec4899" />

    <!-- Front Atom Ring (Cyan) -->
    <ellipse cx="0" cy="0" rx="150" ry="40" fill="none" stroke="url(#primary-grad)" stroke-width="8" transform="rotate(30)" />
    <!-- Small Orb on cyan ring -->
    <circle cx="-110" cy="100" r="14" fill="#06b6d4" />

    <!-- The Letter Q -->
    <g filter="url(#glow)">
      <!-- Main circle of Q -->
      <circle cx="0" cy="0" r="65" fill="none" stroke="url(#primary-grad)" stroke-width="24" />
      <!-- Tail of Q -->
      <path d="M 30 30 Q 70 70 90 90" fill="none" stroke="url(#primary-grad)" stroke-width="24" stroke-linecap="round" />
      
      <!-- Inner highlight for Q -->
      <circle cx="0" cy="0" r="53" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.8" />
      <path d="M 40 40 L 80 80" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.8" />
    </g>
  </g>
</svg>
